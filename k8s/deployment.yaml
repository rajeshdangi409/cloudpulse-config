apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudpulse-app
  namespace: cloudpulse
  labels:
    app.kubernetes.io/name: cloudpulse-app
    app.kubernetes.io/instance: cloudpulse-app
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: cloudpulse
    app.kubernetes.io/managed-by: flux
spec:
  replicas: 2
  selector:
    matchLabels:
      # Selector is immutable — keep it minimal and stable (no version here)
      app.kubernetes.io/name: cloudpulse-app
      app.kubernetes.io/instance: cloudpulse-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudpulse-app
        app.kubernetes.io/instance: cloudpulse-app
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: cloudpulse
        app.kubernetes.io/managed-by: flux
    spec:
      containers:
        - name: cloudpulse-app
          image: 575589967956.dkr.ecr.ap-south-1.amazonaws.com/cloudpulse-app:12
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10

